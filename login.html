<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Management - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f9;
      margin: 0;
    }

    /* Navigation bar */
    nav {
      background-color: #28a745;
      display: flex;
      justify-content: center;
      padding: 10px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 5px;
      transition: background 0.3s;
    }

    nav a:hover {
      background-color: #218838;
    }

    /* Centered container */
    .container {
      background: #fff;
      width: 380px;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
      margin: 50px auto;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      color: #28a745;
      margin: 0;
    }

    .tab-buttons {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
    }

    .tab-buttons button {
      flex: 1;
      padding: 10px;
      cursor: pointer;
      border: none;
      outline: none;
      background: #e0e0e0;
      font-weight: bold;
      border-radius: 6px 6px 0 0;
    }

    .tab-buttons button.active {
      background: #28a745;
      color: white;
    }

    form {
      display: none;
      flex-direction: column;
    }

    form.active {
      display: flex;
    }

    label {
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button.submit {
      margin-top: 15px;
      padding: 10px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button.submit:hover {
      background: #218838;
    }

    /* Responsive nav */
    @media (max-width: 500px) {
      nav {
        flex-direction: column;
      }
      nav a {
        margin: 5px 0;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav>
    <a href="login.html">Login</a>
    <a href="old_patient_info.html">Old Patient Info</a>
    <a href="book_appoinment.html">Book Appointment</a>
    <a href="follow_up.html">Follow-Up</a>
  </nav>

  <div class="container">
    <header>
      <h1>Doctor Appointment</h1>
    </header>

    <div class="tab-buttons">
      <button id="loginTab" class="active" onclick="showForm('login')">Login</button>
      <button id="signupTab" onclick="showForm('signup')">Sign Up</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm" class="active" onsubmit="return loginUser(event)">
      <label>Name</label>
      <input type="text" id="username" placeholder="Enter your name" required>
      
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
      
      <button type="submit" class="submit">Login</button>
    </form>

    <!-- Signup Form -->
    <form id="signupForm">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Email</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Phone</label>
      <input type="tel" placeholder="Enter your phone" required>

      <label>Password</label>
      <input type="password" placeholder="Create a password" required>

      <button type="submit" class="submit">Sign Up</button>
    </form>
  </div>

  <script>
    function showForm(form) {
      document.getElementById('loginForm').classList.remove('active');
      document.getElementById('signupForm').classList.remove('active');
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('signupTab').classList.remove('active');

      if (form === 'login') {
        document.getElementById('loginForm').classList.add('active');
        document.getElementById('loginTab').classList.add('active');
      } else {
        document.getElementById('signupForm').classList.add('active');
        document.getElementById('signupTab').classList.add('active');
      }
    }

    function loginUser(event) {
      event.preventDefault(); // stop form submission

      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Simple check (replace with API later)
      if (username === "doctor" && password === "12345") {
        alert("Login Successful!");
        window.location.href = "old_patient_info.html"; // redirect
      } else {
        alert("Invalid username or password!");
      }
    }
  </script>

</body>
</html>
