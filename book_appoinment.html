<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Appointment</title>
  <style>
    /* Reset and body styling */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background-color: #f5f5f5;
      padding: 20px;
      color: #333;
    }

    /* Navigation Bar */
    nav {
      background-color: #28a745;
      display: flex;
      justify-content: center;
      padding: 10px 0;
      margin-bottom: 20px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 5px;
      transition: background 0.3s;
    }

    nav a:hover {
      background-color: #218838;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1 {
      color: #28a745;
    }

    /* Container */
    .container {
      background-color: #fff;
      padding: 20px;
      max-width: 500px;
      margin: 0 auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    input[type="time"]:focus {
      border-color: #4CAF50;
      outline: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #218838;
    }

    #confirmation {
      margin-top: 20px;
      padding: 10px;
      border-radius: 5px;
      background-color: #e6ffe6;
      color: #2d662d;
      text-align: center;
      font-weight: bold;
    }

    /* Responsive */
    @media (max-width: 500px) {
      nav {
        flex-direction: column;
      }
      nav a {
        margin: 5px 0;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav>
    <a href="login.html">Login</a>
    <a href="old_patient_info.html">Old Patient Info</a>
    <a href="book-appointment.html">Book Appointment</a>
    <a href="follow_up.html">Follow-Up</a>
    
  </nav>

  <!-- Header 
  <header>
    <h1>Doctor Appointment</h1>
  </header>-->

  <!-- Appointment Container -->
  <div class="container">
    <h2>Book Appointment</h2>
    
    <label>Patient Name</label>
    <input type="text" id="patientName" placeholder="Enter your name">

    <label>Select Date</label>
    <input type="date" id="date">

    <label>Select Time</label>
    <input type="time" id="time">

    <button onclick="bookNow()">Book Now</button>

    <div id="confirmation"></div>
  </div>

  <script>
    function bookNow() {
      const name = document.getElementById("patientName").value;
      const date = document.getElementById("date").value;
      const time = document.getElementById("time").value;

      if (name && date && time) {
        document.getElementById("confirmation").innerHTML =
          `Appointment Booked!<br>Name: ${name}<br>Date: ${date}<br>Time: ${time}`;
      } else {
        alert("Please fill all fields: Name, Date, and Time.");
      }
    }
  </script>

</body>
</html>
